<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResQDrive — Emergency Alert</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f3f4f6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .container { max-width: 600px; width: 100%; }
    .header {
      background: #d32f2f;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      text-align: center;
      box-shadow: 0 4px 12px rgba(211,47,47,0.4);
    }
    .header h1 { font-size: 22px; color: white; margin-bottom: 6px; }
    .header p { color: rgba(255,255,255,0.85); font-size: 14px; }
    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid #334155;
    }
    .card h2 {
      color: #d32f2f;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #334155;
      font-size: 14px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #94a3b8; }
    .info-value { color: #f1f5f9; font-weight: 500; text-align: right; }
    .status-active { color: #22c55e; }
    .status-acknowledged { color: #3b82f6; }
    .status-cancelled, .status-expired, .status-exhausted { color: #6b7280; }
    .acknowledge-btn {
      width: 100%;
      background: #22c55e;
      color: white;
      padding: 18px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .acknowledge-btn:hover { background: #16a34a; }
    .acknowledge-btn:disabled { background: #4b5563; cursor: not-allowed; }
    .map-link {
      display: block;
      text-align: center;
      background: #d32f2f;
      color: white;
      padding: 14px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      margin-top: 12px;
    }
    .map-link:hover { background: #b71c1c; }
    .map-iframe {
      width: 100%;
      height: 400px;
      border: none;
      border-radius: 12px;
      margin-top: 12px;
    }
    input[type="text"] {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #475569;
      background: #0f172a;
      color: white;
      font-size: 14px;
      margin-bottom: 12px;
    }
    .success-banner {
      background: #16a34a;
      color: white;
      padding: 16px;
      border-radius: 8px;
      text-align: center;
      margin-top: 12px;
      font-weight: 600;
    }
    .error-banner {
      background: #dc2626;
      color: white;
      padding: 16px;
      border-radius: 8px;
      text-align: center;
      margin-top: 12px;
    }
    .loader {
      text-align: center;
      padding: 40px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚨 ResQDrive Emergency Alert</h1>
      <p>You have been sent this link because someone you know may be in danger.</p>
    </div>

    <div id="content"><div class="loader">Loading alert details…</div></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const shareToken = params.get('session');
    const contentEl = document.getElementById('content');

    if (!shareToken) {
      contentEl.innerHTML = '<div class="error-banner">Invalid link — no session ID provided.</div>';
      throw new Error('No session');
    }

    async function loadSession() {
      try {
        const res = await fetch(`/emergency-notification/public/${shareToken}`);
        if (!res.ok) throw new Error('Not found');
        const data = await res.json();
        renderSession(data);
      } catch (err) {
        contentEl.innerHTML = '<div class="error-banner">Alert not found or expired.</div>';
      }
    }

    function renderSession(data) {
      const statusClass = `status-${data.status.toLowerCase()}`;
      const triggered = new Date(data.triggeredAt).toLocaleString();
      const acknowledged = data.acknowledgedAt ? new Date(data.acknowledgedAt).toLocaleString() : null;

      let html = `
        <div class="card">
          <h2>Alert Status</h2>
          <div class="info-row">
            <span class="info-label">Status</span>
            <span class="info-value ${statusClass}"><strong>${data.status}</strong></span>
          </div>
          <div class="info-row">
            <span class="info-label">Triggered at</span>
            <span class="info-value">${triggered}</span>
          </div>
          ${acknowledged ? `
          <div class="info-row">
            <span class="info-label">Acknowledged at</span>
            <span class="info-value">${acknowledged}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Acknowledged by</span>
            <span class="info-value">${data.acknowledgedBy || 'Someone'}</span>
          </div>` : ''}
        </div>

        <div class="card">
          <h2>Person in Distress</h2>
          <div class="info-row">
            <span class="info-label">Name</span>
            <span class="info-value">${data.user?.fullName || 'Unknown'}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Phone</span>
            <span class="info-value"><a href="tel:${data.user?.phoneNumber}" style="color: #d32f2f;">${data.user?.phoneNumber || '—'}</a></span>
          </div>
        </div>
      `;

      if (data.incident) {
        html += `
          <div class="card">
            <h2>Incident Details</h2>
            <div class="info-row">
              <span class="info-label">Severity</span>
              <span class="info-value">${data.incident.severity}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Address</span>
              <span class="info-value">${data.incident.address || 'Unknown'}</span>
            </div>
            ${data.incident.description ? `
            <div class="info-row">
              <span class="info-label">Description</span>
              <span class="info-value">${data.incident.description}</span>
            </div>` : ''}
          </div>
        `;
      }

      if (data.locationSession && data.locationSession.trackUrl) {
        html += `
          <div class="card">
            <h2>Live Location</h2>
            <p style="color: #94a3b8; font-size: 13px; margin-bottom: 12px;">The person's live GPS location is shown below. Updates every 5 seconds.</p>
            <iframe src="${data.locationSession.trackUrl}" class="map-iframe" allow="geolocation"></iframe>
            <a href="${data.locationSession.trackUrl}" target="_blank" class="map-link">Open Full-Screen Map →</a>
          </div>
        `;
      }

      if (data.status === 'ACTIVE') {
        html += `
          <div class="card">
            <h2>Acknowledge This Alert</h2>
            <p style="color: #94a3b8; font-size: 13px; margin-bottom: 12px;">By acknowledging, you confirm you have received this alert. The person in distress will be notified.</p>
            <input type="text" id="ackName" placeholder="Your name (optional)" />
            <button class="acknowledge-btn" onclick="acknowledge()">✓ I Acknowledge This Alert</button>
          </div>
        `;
      } else if (data.status === 'ACKNOWLEDGED') {
        html += `<div class="success-banner">✓ This alert has been acknowledged by ${data.acknowledgedBy || 'someone'}.</div>`;
      } else if (data.status === 'CANCELLED') {
        html += `<div class="success-banner">This alert was cancelled by the person in distress. They are safe.</div>`;
      } else if (data.status === 'EXPIRED') {
        html += `<div class="error-banner">This alert has expired (no acknowledgement for 30 minutes).</div>`;
      } else if (data.status === 'EXHAUSTED') {
        html += `<div class="error-banner">All emergency contacts were notified but no one acknowledged.</div>`;
      }

      contentEl.innerHTML = html;
    }

    async function acknowledge() {
      const name = document.getElementById('ackName').value.trim() || 'Anonymous';
      const btn = document.querySelector('.acknowledge-btn');
      btn.disabled = true;
      btn.textContent = 'Acknowledging…';

      try {
        const res = await fetch(`/emergency-notification/public/${shareToken}/acknowledge`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name }),
        });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.message || 'Failed to acknowledge');
        }
        const data = await res.json();
        loadSession();
      } catch (err) {
        btn.disabled = false;
        btn.textContent = '✓ I Acknowledge This Alert';
        alert('Failed to acknowledge: ' + err.message);
      }
    }

    loadSession();
    setInterval(loadSession, 10000);
  </script>
</body>
</html>
